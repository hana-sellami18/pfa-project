<!-- Barre de navigation -->
<div class="navbar">
  <div class="logo">AI-Powered Document Summarizer </div>
  <div class="navbar-actions">
    <!-- Icône login -->
    <i class="fa-regular fa-user login-icon" (click)="goTo('/login')" title="Connexion"></i>
    <!-- Icône menu burger -->
    <i class="fa-solid fa-bars burger" (click)="toggleSidebar()" title="Menu"></i>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" [class.open]="sidebarOpen">
  <div class="close-btn" (click)="toggleSidebar()" title="Fermer">
    <i class="fa-solid fa-xmark"></i>
  </div>
  <ul>
    <li (click)="goTo('/summarize')">
      <i class="fa-solid fa-file-lines"></i>
      <span>Résumé</span>
    </li>
    <li (click)="goTo('/history')">
      <i class="fa-regular fa-clock"></i>
      <span>Historique des résumés</span>
    </li>
    <li (click)="logout()">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      <span>Se déconnecter</span>
    </li>
  </ul>
</div>

<!-- Overlay -->
<div class="overlay" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>
